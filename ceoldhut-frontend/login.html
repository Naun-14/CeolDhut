<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CeòlDhut</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

<!-- Simple nav for auth page -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="https://i.ibb.co/N6QMp4RY/logo-png.png" alt="CeòlDhut" onerror="this.style.display='none'" style="height:36px">
      <span class="nav-logo-text">CeòlDhut</span>
    </a>
    <div style="margin-left:auto">
      <a href="index.html" class="btn btn-ghost btn-sm">← Back to home</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-text">CeòlDhut</div>
      <div class="auth-logo-sub">Celtic Music Platform</div>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
    </div>

    <!-- Message -->
    <div id="auth-msg"></div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        <div class="form-error" id="login-email-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
        <div class="form-error" id="login-pass-err"></div>
      </div>
      <button class="form-submit" id="login-btn" onclick="handleLogin()">Login</button>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="reg-email" placeholder="your@email.com" autocomplete="email">
        <div class="form-error" id="reg-email-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="reg-password" placeholder="Minimum 6 characters" autocomplete="new-password">
        <div class="form-error" id="reg-pass-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" id="reg-confirm" placeholder="Repeat password" autocomplete="new-password">
        <div class="form-error" id="reg-confirm-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <select class="form-input" id="reg-role">
          <option value="USER">Listener</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <button class="form-submit" id="register-btn" onclick="handleRegister()">Create Account</button>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
// Redirect if already logged in
if (Auth.isLoggedIn()) window.location.href = 'index.html';

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('auth-msg').innerHTML = '';
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginVisible = document.getElementById('form-login').style.display !== 'none';
  if (loginVisible) handleLogin();
  else handleRegister();
});

async function handleLogin() {
  clearErrors();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  let valid = true;

  if (!email) { showErr('login-email-err', 'login-email', 'Email is required'); valid = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('login-email-err', 'login-email', 'Invalid email'); valid = false; }
  if (!password) { showErr('login-pass-err', 'login-password', 'Password is required'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Logging in…';

  try {
    const data = await Api.post('/auth/login', { email, password });
    if (data.token) {
      Auth.save(data.token, { email: data.email, role: data.role, id: data.user_id });
      showMsg('success', 'Welcome back! Redirecting…');
      setTimeout(() => {
        const redirect = new URLSearchParams(window.location.search).get('redirect') || 'index.html';
        window.location.href = redirect;
      }, 800);
    } else {
      showMsg('error', data.error || 'Login failed. Check your credentials.');
    }
  } catch(e) {
    showMsg('error', 'Could not connect to server. Is the backend running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

async function handleRegister() {
  clearErrors();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const confirm = document.getElementById('reg-confirm').value;
  const role = document.getElementById('reg-role').value || 'USER';
  let valid = true;

  if (!email) { showErr('reg-email-err', 'reg-email', 'Email is required'); valid = false; }
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showErr('reg-email-err', 'reg-email', 'Invalid email'); valid = false; }
  if (!password) { showErr('reg-pass-err', 'reg-password', 'Password is required'); valid = false; }
  else if (password.length < 6) { showErr('reg-pass-err', 'reg-password', 'Minimum 6 characters'); valid = false; }
  if (password !== confirm) { showErr('reg-confirm-err', 'reg-confirm', 'Passwords do not match'); valid = false; }
  if (!valid) return;

  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    const data = await Api.post('/auth/register', { email, password, role });
    if (data.message && !data.error) {
      showMsg('success', 'Account created! Logging you in…');
      // Auto login
      const loginData = await Api.post('/auth/login', { email, password });
      if (loginData.token) {
        Auth.save(loginData.token, { email: loginData.email, role: loginData.role, id: loginData.user_id });
        setTimeout(() => window.location.href = loginData.role === 'ADMIN' ? 'admin.html' : 'index.html', 800);
      }
    } else {
      showMsg('error', data.error || 'Registration failed.');
    }
  } catch(e) {
    showMsg('error', 'Could not connect to server. Is the backend running?');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

function showMsg(type, msg) {
  document.getElementById('auth-msg').innerHTML = `<div class="form-msg ${type}">${msg}</div>`;
}
function showErr(errId, inputId, msg) {
  const err = document.getElementById(errId);
  const input = document.getElementById(inputId);
  if (err) { err.textContent = msg; err.classList.add('show'); }
  if (input) input.classList.add('error');
}
function clearErrors() {
  document.querySelectorAll('.form-error').forEach(e => { e.textContent = ''; e.classList.remove('show'); });
  document.querySelectorAll('.form-input').forEach(i => i.classList.remove('error'));
  document.getElementById('auth-msg').innerHTML = '';
}
</script>
</body>
</html>
