<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music App</title>
  <link rel="stylesheet" href="client.css">
</head>
<body>

<header class="header">
  <h1>My Music App</h1>
</header>

<section class="song-list">
  <h2>Playlist</h2>

  <div class="song">
    <span>Song 1 - Artist A</span>
    <button>Play</button>
  </div>

  <div class="song">
    <span>Song 2 - Artist B</span>
    <button>Play</button>
  </div>

</section>

<footer class="player">
  <p>Now Playing: None</p>
  <div class="controls">
    <button>⏮</button>
    <button>▶</button>
    <button>⏭</button>
  </div>
</footer>

</body>
</html>
