<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">
  
  <aside class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li>Dashboard</li>
      <li>Manage Music</li>
      <li>Users</li>
      <li>Settings</li>
    </ul>
  </aside>

  <main class="main-content">
    
    <header>
      <h1>Dashboard</h1>
      <button class="upload-btn">+ Upload Music</button>
    </header>

    <section class="cards">
      <div class="card">Total Songs: 120</div>
      <div class="card">Users: 45</div>
      <div class="card">Plays: 3,200</div>
    </section>

    <section class="table-section">
      <h2>Music Library</h2>
      <table>
        <tr>
          <th>Title</th>
          <th>Artist</th>
          <th>Actions</th>
        </tr>
        <tr>
          <td>Song 1</td>
          <td>Artist A</td>
          <td><button>Edit</button> <button>Delete</button></td>
        </tr>
        <tr>
          <td>Song 2</td>
          <td>Artist B</td>
          <td><button>Edit</button> <button>Delete</button></td>
        </tr>
      </table>
    </section>

  </main>

</div>

</body>
</html>
